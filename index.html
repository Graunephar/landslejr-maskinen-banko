<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>BANKO — Maskinen · Landslejr 2026</title>
<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:#0c0906; overflow:hidden; }
  body{
    --orange:#ff6b1a; --orange-deep:#e0490f; --glow:#ff922e; --hot:#ffb257;
    --teal:#3fe6cc; --party:#c94fd6; --party2:#42d6c0;
    --bg:#140f0b; --panel:#1e1712; --plate:#efe8dd; --plate-blank:#cdbfae; --ink:#181310;
    --bezel1:#d8c9a6; --bezel2:#b39a68; --glowbg:#43301d; --sub:#a98d68; --btnglow:#ff922e;
    font-family:ui-monospace,"SF Mono",Menlo,monospace;
  }

  /* --- Stage: always-landscape (ADR-10). Portrait → rotate whole app 90° via CSS. --- */
  .stage{
    position:relative; overflow:hidden;
    width:100vw; height:100vh; width:100dvw; height:100dvh;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(120% 90% at 50% -20%,var(--glowbg) 0%,var(--bg) 55%); transition:background .45s;
    padding:max(10px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right)) max(10px,env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-left));
  }
  /* Natural landscape: fill the wide screen. Panel takes the full viewport height
     (never under the address bar), grid flexes to fill, cells drop the square lock
     so numbers grow big instead of leaving black side-bars. Capped for desktop. */
  @media (orientation:landscape){
    .stage .bezel{ width:100%; max-width:min(1100px, 96vw); height:min(calc(100dvh - 16px), 560px); }
    .panel{ display:flex; flex-direction:column; height:100%; }
    .stage .grid{ flex:1 1 auto; min-height:0; min-width:0; grid-template-columns:repeat(9,minmax(0,1fr)); }
    .stage .cell{ aspect-ratio:auto; }   /* .stage bumps specificity over base .grid / .cell rules that come later in source */
  }
  @media (orientation:portrait){
    .stage{
      position:fixed; top:0; left:100%;
      width:100vh; height:100vw; width:100dvh; height:100dvw;
      transform:rotate(90deg); transform-origin:top left;
      padding:max(10px,env(safe-area-inset-left)) max(10px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right)) max(10px,env(safe-area-inset-bottom));
    }
    /* Rotated machine is landscape-shaped → fill layout so cells fit the (short) height instead of overflowing.
       Machine width relates to screen height (dvh), machine height to screen width (dvw). */
    .stage .bezel{ width:100%; max-width:min(1100px, 96dvh); height:min(calc(100dvw - 16px), 560px); }
    .panel{ display:flex; flex-direction:column; height:100%; }
    .stage .grid{ flex:1 1 auto; min-height:0; min-width:0; grid-template-columns:repeat(9,minmax(0,1fr)); }
    .stage .cell{ aspect-ratio:auto; }
  }
  /* Small machines (old/small phones): the full-size 2× chrome + centered title overflows the rail.
     Scale the top chrome down so the title never collides with the controls. Grid stays big. */
  @media (orientation:portrait) and (max-height:720px), (orientation:landscape) and (max-width:760px){
    .stage .rail{ padding:3px 40px 6px; gap:6px; }
    .stage .lgroup, .stage .rgroup{ gap:6px; }
    .stage .crt{ width:68px; height:34px; }
    .stage .crt-num{ font-size:18px; } .stage .crt-num span{ font-size:12px; }
    .stage .scan{ height:10px; }
    .stage .knob{ width:22px; height:22px; } .stage .tgl{ width:14px; height:22px; } .stage .redbtn{ width:22px; height:22px; }
    .stage .fader{ width:36px; height:22px; }
    .stage .title{ font-size:14px; letter-spacing:.1em; text-indent:.1em; }
    .stage .sub{ font-size:6px; letter-spacing:.14em; text-indent:.14em; }
    .stage .serial{ font-size:9.5px; }
    .stage .screw{ width:28px; height:28px; }
    .stage .s1{top:6px;left:6px}.stage .s2{top:6px;right:6px}.stage .s3{bottom:6px;left:6px}.stage .s4{bottom:6px;right:6px}
  }
  /* Ultra-small (ancient phones, ~320×480): shrink the chrome one more step */
  @media (orientation:portrait) and (max-height:520px), (orientation:landscape) and (max-width:560px){
    .stage .rail{ padding:3px 34px 5px; gap:5px; }
    .stage .lgroup, .stage .rgroup{ gap:5px; }
    .stage .crt{ width:56px; height:28px; } .stage .crt-num{ font-size:15px; } .stage .crt-num span{ font-size:9px; }
    .stage .knob{ width:20px; height:20px; } .stage .tgl{ width:13px; height:20px; } .stage .redbtn{ width:20px; height:20px; }
    .stage .fader{ width:30px; height:20px; }
    .stage .title{ font-size:11px; letter-spacing:.04em; text-indent:.04em; }
    .stage .sub{ font-size:5.5px; }
    .stage .serial{ font-size:8.5px; }
    .stage .screw{ width:24px; height:24px; }
    .stage .s1{top:5px;left:5px}.stage .s2{top:5px;right:5px}.stage .s3{bottom:5px;left:5px}.stage .s4{bottom:5px;right:5px}
  }

  .bezel{ background:linear-gradient(180deg,var(--bezel1),var(--bezel2)); transition:background .45s; padding:7px; border-radius:15px; max-width:820px; width:100%;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.5),inset 0 -3px 6px rgba(0,0,0,.35),0 12px 34px rgba(0,0,0,.55); }
  .panel{ position:relative; background:var(--panel); border:1px solid #3a2c1e; border-radius:9px;
    padding:11px 14px 12px; box-shadow:inset 0 0 46px rgba(0,0,0,.6); overflow:hidden; transition:box-shadow .3s,background .45s; }
  .panel.party{ animation:disco 1.1s linear infinite; }
  @keyframes disco{
    0%{ box-shadow:inset 0 0 60px rgba(201,79,214,.34),0 0 0 2px rgba(255,107,26,.5) }
    33%{ box-shadow:inset 0 0 60px rgba(63,214,192,.34),0 0 0 2px rgba(201,79,214,.6) }
    66%{ box-shadow:inset 0 0 60px rgba(255,107,26,.4),0 0 0 2px rgba(63,214,192,.6) }
    100%{ box-shadow:inset 0 0 60px rgba(201,79,214,.34),0 0 0 2px rgba(255,107,26,.5) }
  }

  .screw{ position:absolute; z-index:5; width:40px; height:40px; border-radius:50%;
    background:radial-gradient(circle at 38% 30%, #f2e9d2 0%, #dccaa2 24%, #ab9569 60%, #6f5a3b 88%, #4c3c26 100%);
    border:1px solid #43331f;
    box-shadow:inset 0 2px 3px rgba(255,255,255,.55), inset 0 -4px 7px rgba(0,0,0,.5), 0 1px 3px rgba(0,0,0,.55); }
  .screw::before, .screw::after{ content:""; position:absolute; top:50%; left:17%; right:17%; height:11%;
    background:linear-gradient(#2c2013,#150e07); border-radius:3px;
    box-shadow:inset 0 1px 2px rgba(0,0,0,.9), 0 1px 0 rgba(255,255,255,.22); }
  .screw::before{ transform:translateY(-50%) rotate(35deg); }
  .screw::after{ transform:translateY(-50%) rotate(125deg); }
  .s1{top:7px;left:7px}.s2{top:7px;right:7px}.s3{bottom:7px;left:7px}.s4{bottom:7px;right:7px}

  .rail{ position:relative; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:4px 50px 8px; }
  .lgroup, .rgroup{ display:flex; align-items:center; gap:12px; flex:none; }
  .crt{ position:relative; width:104px; height:52px; border-radius:8px; background:#04120f; flex:none; border:2px solid #3a2c1e; box-shadow:inset 0 0 14px rgba(63,230,204,.35); overflow:hidden; }
  .crt-grid{ position:absolute; inset:0; opacity:.32; background-image:linear-gradient(var(--teal) 1px,transparent 1px),linear-gradient(90deg,var(--teal) 1px,transparent 1px); background-size:12px 12px; }
  .crt-num{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--teal); font-weight:800; font-size:28px; text-shadow:0 0 8px var(--teal) }
  .crt-num span{ color:#6f8f88; font-size:18px }
  .scan{ position:absolute; left:0; right:0; height:14px; background:linear-gradient(rgba(63,230,204,.18),transparent); animation:scan 2.6s linear infinite }
  @keyframes scan{ 0%{ top:-14px } 100%{ top:52px } }
  .knobs{ display:flex; align-items:center; gap:12px; flex:none }
  .knob{ width:32px; height:32px; border-radius:50%; position:relative; background:radial-gradient(circle at 38% 30%,#4a3a2a,#181109 78%); border:2px solid #4a3a2a }
  .knob::after{ content:""; position:absolute; left:50%; top:4px; width:4px; height:12px; background:var(--hot); border-radius:2px; box-shadow:0 0 6px var(--btnglow); transform-origin:bottom }
  .k1::after{ transform:translateX(-50%) rotate(-40deg) } .k3::after{ transform:translateX(-50%) rotate(40deg) }
  .tgl{ width:20px; height:32px; border-radius:3px; background:#241a12; border:2px solid #4a3a2a; position:relative }
  .tgl.on::after{ content:""; position:absolute; left:3px; right:3px; top:3px; height:12px; border-radius:2px; background:var(--hot); box-shadow:0 0 6px var(--btnglow) }
  .tgl.flip{ animation:tglflip .22s ease }
  @keyframes tglflip{ 0%,100%{ transform:scale(1) } 50%{ transform:scale(1.18) } }
  .redbtn{ width:30px; height:30px; border-radius:50%; background:radial-gradient(circle at 38% 32%,#ff6a5a,#a01508 76%); border:3px solid #2a0d07; box-shadow:0 0 12px rgba(220,40,20,.5) }
  /* New control types (right cluster, balance the left) — distinct from knob/toggle/CRT/redbtn */
  .fader{ position:relative; width:52px; height:30px; border-radius:4px; background:#181109; border:2px solid #4a3a2a; box-shadow:inset 0 1px 4px rgba(0,0,0,.7); flex:none; cursor:pointer }
  .fader::before{ content:""; position:absolute; left:5px; right:5px; top:50%; height:3px; transform:translateY(-50%); background:#3a2c1e; border-radius:2px }
  .fader::after{ content:""; position:absolute; top:3px; bottom:3px; left:58%; width:9px; border-radius:3px; background:linear-gradient(#e2d3ad,#8a7550); box-shadow:0 0 5px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.5) }
  .fader.slid::after{ animation:faderslide .4s ease }
  @keyframes faderslide{ 0%{ left:58% } 50%{ left:14% } 100%{ left:58% } }

  .nameplate{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); text-align:center; line-height:1; z-index:2; pointer-events:none; }
  .nameplate .title, .nameplate .sub{ pointer-events:auto; }
  .title{ color:var(--orange); font-weight:800; font-size:20px; letter-spacing:.26em; text-indent:.26em; text-shadow:0 0 16px rgba(255,107,26,.6); cursor:pointer; user-select:none; white-space:nowrap; }
  .title.flick{ animation:titleflick .55s steps(1); }
  @keyframes titleflick{ 0%{opacity:1} 15%{opacity:.25} 30%{opacity:1} 45%{opacity:.35} 60%{opacity:1} 75%{opacity:.5} 100%{opacity:1} }
  .title.blast{ animation:titleblast .7s ease; }
  @keyframes titleblast{
    0%{ transform:none; filter:none }
    25%{ transform:scale(1.2) rotate(-2deg); filter:brightness(1.5) }
    50%{ transform:scale(1.12) rotate(2deg); filter:hue-rotate(120deg) brightness(1.5) }
    75%{ transform:scale(1.16) rotate(-1deg); filter:hue-rotate(250deg) brightness(1.4) }
    100%{ transform:none; filter:none }
  }
  .sub{ color:var(--sub); font-size:8.5px; letter-spacing:.3em; text-indent:.3em; margin-top:4px; white-space:nowrap; pointer-events:auto; cursor:pointer }
  .serial{ flex:none; color:var(--teal); font-weight:800; font-size:12px; letter-spacing:1px; text-shadow:0 0 8px var(--teal); white-space:nowrap }

  .batwrap{ display:flex; align-items:stretch; gap:3px; margin:0 2px 11px; cursor:pointer; }
  .battery{ flex:1; display:flex; gap:2px; padding:3px; background:#0c0906; border:2px solid #4a3a2a; border-radius:5px; box-shadow:inset 0 0 6px #000; }
  .battery i{ flex:1; border-radius:1px; background:#241d15; transition:background .14s,box-shadow .14s }
  .battery i.on.g{ background:#46d97a; box-shadow:0 0 6px #46d97a }
  .battery i.on.a{ background:var(--hot); box-shadow:0 0 6px var(--glow) }
  .battery i.on.r{ background:#ff4d3d; box-shadow:0 0 8px #ff4d3d }
  .nub{ width:5px; align-self:center; height:14px; background:#4a3a2a; border-radius:0 3px 3px 0 }
  .full .battery{ border-color:var(--orange); box-shadow:inset 0 0 6px #000,0 0 14px rgba(255,107,26,.6) }

  /* Secret line = absolute overlay → never reflows the grid. Bigger, centered over the machine. */
  .secret{ position:absolute; left:0; right:0; top:46%; transform:translateY(-50%); z-index:6; text-align:center; padding:0 6%;
    color:#fff; font-size:clamp(22px,5.6vw,40px); font-weight:900; letter-spacing:.06em; line-height:1.15;
    opacity:0; pointer-events:none; transition:opacity .25s;
    text-shadow:0 0 30px var(--glow),0 0 10px var(--orange),0 2px 6px rgba(0,0,0,.9); }
  .secret.show{ opacity:1; }
  .secret.punch{ animation:secpunch .45s ease; }
  @keyframes secpunch{ 0%{transform:translateY(-50%) scale(.6)} 55%{transform:translateY(-50%) scale(1.16)} 100%{transform:translateY(-50%) scale(1)} }
  /* Senior egg — text arrives tilted with its own pop */
  .secret.soul{ transform:translateY(-50%) rotate(-7deg); animation:soulpop .55s cubic-bezier(.2,1.3,.4,1); }
  @keyframes soulpop{ 0%{transform:translateY(-50%) rotate(-7deg) scale(.5);opacity:0} 60%{transform:translateY(-50%) rotate(-7deg) scale(1.12)} 100%{transform:translateY(-50%) rotate(-7deg) scale(1)} }
  /* Aura — new background: warm halo that breathes + gentle rising light (supports the wholesome message) */
  .aura{ position:absolute; inset:0; z-index:5; pointer-events:none; opacity:0; transition:opacity .45s; overflow:hidden; }
  .aura.show{ opacity:1; }
  .aura::before{ content:""; position:absolute; inset:-25%; background:radial-gradient(circle at 50% 47%, rgba(255,198,124,.5), rgba(255,120,40,.15) 42%, transparent 68%); animation:auraBreathe 3.2s ease-in-out infinite; }
  .aura::after{ content:""; position:absolute; inset:0; background:repeating-linear-gradient(0deg, rgba(255,226,190,.07) 0 2px, transparent 2px 26px); animation:auraRise 2.4s linear infinite; }
  @keyframes auraBreathe{ 0%,100%{ transform:scale(.9); opacity:.55 } 50%{ transform:scale(1.14); opacity:1 } }
  @keyframes auraRise{ from{ transform:translateY(0) } to{ transform:translateY(-26px) } }

  .grid{ display:grid; grid-template-columns:repeat(9,1fr); grid-template-rows:repeat(3,1fr); gap:5px; background:#100b07; padding:6px; border-radius:8px; border:1px solid #4a3a2b; container-type:inline-size; }
  .cell{ aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:clamp(15px,6.4cqw,38px); font-weight:800; border-radius:6px; position:relative; }
  .cell.num{ background:var(--plate); color:var(--ink); cursor:pointer; box-shadow:inset 0 -3px 0 rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.6); transition:transform .05s,box-shadow .1s,background .12s,color .12s; }
  .cell.num:active{ transform:translateY(2px); box-shadow:inset 0 -1px 0 rgba(0,0,0,.2) }
  .cell.blank{ background:var(--plate-blank); opacity:.26 }
  .cell.lit{ color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.55); background:radial-gradient(circle at 50% 42%,var(--hot) 0%,var(--orange) 58%,var(--orange-deep) 100%); box-shadow:0 0 0 2px color-mix(in srgb,var(--btnglow) 50%,#000),0 0 22px 4px color-mix(in srgb,var(--btnglow) 56%,transparent),inset 0 2px 7px rgba(255,220,180,.6); animation:pulse 2.1s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 0 0 2px color-mix(in srgb,var(--btnglow) 50%,#000),0 0 16px 3px color-mix(in srgb,var(--btnglow) 42%,transparent),inset 0 2px 7px rgba(255,220,180,.6) } 50%{ box-shadow:0 0 0 2px color-mix(in srgb,var(--btnglow) 50%,#000),0 0 28px 7px color-mix(in srgb,var(--btnglow) 63%,transparent),inset 0 2px 7px rgba(255,220,180,.6) } }

  .statusbar{ display:flex; align-items:center; gap:12px; margin-top:12px; padding:0 50px; height:26px }
  .pwr{ width:18px; height:18px; border-radius:50%; background:var(--btnglow); box-shadow:0 0 12px 3px var(--btnglow); animation:breathe 2.4s ease-in-out infinite }
  @keyframes breathe{ 0%,100%{ opacity:.55 } 50%{ opacity:1 } }
  .rivets{ margin-left:24px; display:flex; align-items:center; gap:10px; flex:none; }
  .rivets i{ width:9px; height:9px; border-radius:50%; background:radial-gradient(circle at 35% 30%,#6b5738,#241a10 78%); box-shadow:inset 0 0 1px #000,0 1px 0 rgba(255,255,255,.08); cursor:pointer; }
  .readout{ margin-left:auto; color:var(--sub); font-size:10px; letter-spacing:.2em; cursor:pointer; white-space:nowrap }
  .readout.tease{ animation:stamp .4s ease; color:var(--hot); text-shadow:0 0 8px var(--glow) }
  .party .pwr{ background:var(--party2); box-shadow:0 0 10px 3px var(--party) }

  /* Debug (?fejlfinding) */
  .dbg{ display:none; gap:8px; align-items:center; margin:8px 2px 0; }
  .dbg.on{ display:flex; }
  .dbg button{ font-family:inherit; font-size:12px; font-weight:800; letter-spacing:.08em; color:#fff; background:radial-gradient(circle at 38% 32%,#ff6a5a,#a01508 76%); border:1.5px solid #2a0d07; border-radius:6px; padding:7px 12px; cursor:pointer; }
  .dbg .info{ color:#a98d68; font-size:10px; }

  /* --- Party overlay (ADR-12): win-type + confetti + return countdown --- */
  .confetti{ position:absolute; inset:0; pointer-events:none; z-index:7; }
  .win{ position:absolute; inset:0; z-index:5; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:clamp(24px,7vh,56px);
    background:rgba(20,15,11,.74); opacity:0; pointer-events:none; transition:opacity .25s; }
  .win.show{ opacity:1; pointer-events:auto; }
  .win .type{ font-size:clamp(34px,9vw,60px); font-weight:900; letter-spacing:.12em; color:#fff; text-align:center;
    text-shadow:0 0 34px var(--glow),0 0 8px var(--orange); transform:rotate(-6deg) scale(.85); transition:transform .25s; }
  .win.show .type{ transform:rotate(-6deg) scale(1); }
  .win .banko{ font-size:clamp(18px,4vw,26px); font-weight:800; letter-spacing:.3em; color:var(--hot); }
  .ret{ width:70%; max-width:420px; }
  .ret .lbl{ text-align:center; color:#e9d9bd; font-size:11px; letter-spacing:.2em; margin-bottom:6px; }
  .ret .track{ height:10px; border-radius:6px; background:#0c0906; border:2px solid #4a3a2a; overflow:hidden; box-shadow:inset 0 0 6px #000; }
  .ret .bar{ height:100%; width:100%; background:linear-gradient(90deg,var(--hot),var(--orange),var(--orange-deep)); }
  .ret .bar.run{ width:0; transition:width 10s linear; }

  /* --- Easter eggs (all on non-functional chrome; never block marking) --- */
  /* A — red button overheat: shake + amber flash */
  .bezel.shake{ animation:shake .5s ease; }
  @keyframes shake{ 0%,100%{transform:translate(0,0)} 20%{transform:translate(-4px,2px) rotate(-.4deg)} 40%{transform:translate(4px,-2px) rotate(.4deg)} 60%{transform:translate(-3px,1px)} 80%{transform:translate(3px,-1px)} }
  .flash{ position:absolute; inset:0; z-index:5; background:var(--hot); opacity:0; pointer-events:none; }
  .flash.on{ animation:flashpulse .16s steps(1) 3; }
  @keyframes flashpulse{ 0%{opacity:.5} 50%{opacity:0} 100%{opacity:.5} }
  /* B — konami max-disco strobe (no confetti) */
  .strobe{ position:absolute; inset:0; z-index:5; opacity:0; pointer-events:none; mix-blend-mode:screen; }
  .strobe.on{ animation:strobe .11s steps(1) infinite; }
  @keyframes strobe{ 0%{background:#fff;opacity:.85} 25%{background:var(--party);opacity:.7} 50%{background:#000;opacity:.25} 75%{background:var(--teal);opacity:.7} 100%{background:var(--orange);opacity:.8} }
  /* Combo 1 — white strobe rave */
  .strobe.white{ animation:wstrobe .09s steps(1) infinite; }
  @keyframes wstrobe{ 0%{background:#fff;opacity:.92} 50%{background:#000;opacity:.12} 100%{background:#fff;opacity:.92} }
  /* Combo 2 — expanding shockwave rings */
  .pulsering{ position:absolute; left:50%; top:50%; width:30px; height:30px; margin:-15px 0 0 -15px; border-radius:50%; border:4px solid var(--glow); z-index:7; pointer-events:none; box-shadow:0 0 16px var(--glow); animation:pulsering 1s ease-out forwards; }
  @keyframes pulsering{ 0%{ transform:scale(.2); opacity:.9 } 100%{ transform:scale(9); opacity:0 } }
  /* Combo 4 — police siren red/blue flood */
  .siren{ position:absolute; inset:0; z-index:5; opacity:0; pointer-events:none; mix-blend-mode:screen; }
  .siren.on{ animation:sirenflood .5s steps(1) infinite; }
  @keyframes sirenflood{ 0%{ background:radial-gradient(circle at 22% 50%, rgba(255,40,40,.75), transparent 55%); opacity:1 } 50%{ background:radial-gradient(circle at 78% 50%, rgba(50,90,255,.75), transparent 55%); opacity:1 } 100%{ background:radial-gradient(circle at 22% 50%, rgba(255,40,40,.75), transparent 55%); opacity:1 } }
  /* Combo 6 — 8-bit victory colour flash */
  .strobe.chip{ animation:chipflash .16s steps(1) infinite; }
  @keyframes chipflash{ 0%{background:#ffde3a;opacity:.72} 33%{background:#3fe6cc;opacity:.72} 66%{background:#ff6b1a;opacity:.72} 100%{background:#c94fd6;opacity:.72} }
  /* Combo 7 — bass-drop panel throb */
  .panel.throb{ animation:throb .5s ease-in-out 4; }
  @keyframes throb{ 0%,100%{ transform:scale(1); box-shadow:inset 0 0 46px rgba(0,0,0,.6) } 50%{ transform:scale(1.035); box-shadow:inset 0 0 60px rgba(255,60,20,.4),0 0 30px rgba(255,80,30,.5) } }
  /* Combo 8 — power-up gold glow flash */
  .panel.flashup{ animation:flashup .5s ease; }
  @keyframes flashup{ 0%,100%{ box-shadow:inset 0 0 46px rgba(0,0,0,.6) } 50%{ box-shadow:inset 0 0 40px rgba(255,220,120,.5),0 0 28px rgba(255,210,90,.75) } }
  /* Combo 9 — power-down brief dim */
  .panel.dim{ animation:pdim .85s ease; }
  @keyframes pdim{ 0%,100%{ filter:none } 45%{ filter:brightness(.5) saturate(.6) } }
  /* C — knob rev spin */
  .knob{ cursor:pointer; }
  .knob.rev{ animation:knobspin .6s cubic-bezier(.2,.8,.3,1); }
  @keyframes knobspin{ to{ transform:rotate(540deg) } }
  /* D — screws unscrew, fall, engine-room finale */
  .screw{ cursor:pointer; touch-action:none; transition:transform .25s,opacity .25s; }
  .screw.tick{ animation:screwtick 1.5s; }
  @keyframes screwtick{
    0%{ transform:rotate(0); animation-timing-function:cubic-bezier(.15,.85,.25,1) }   /* snap fast to 180° */
    16%{ transform:rotate(180deg); animation-timing-function:ease-out }                /* then unwind slowly back */
    100%{ transform:rotate(0) }
  }
  .screw.loosening{ animation:unscrew 1.5s linear forwards; }
  @keyframes unscrew{ 0%{transform:rotate(0) scale(1)} 100%{transform:rotate(540deg) scale(.9)} }
  /* Empty screw hole left behind after a screw falls out */
  .screw.hole{ background:radial-gradient(circle at 50% 42%, #000 0%, #0b0806 72%, #241a10 100%); border-color:#0a0705;
    box-shadow:inset 0 3px 6px rgba(0,0,0,.95), inset 0 -1px 2px rgba(255,255,255,.06), 0 1px 2px rgba(0,0,0,.5); }
  .screw.hole::before, .screw.hole::after{ display:none; }
  /* Fallen screw = a fixed-position clone appended to <body> → escapes the panel clip, drops out the window */
  /* Screws fall toward the MACHINE's bottom: down in landscape, left in portrait (machine rotated 90°) */
  .screwfly{ position:fixed; width:40px; height:40px; z-index:9999; pointer-events:none; }
  .screwfly.down{ animation:flydown 1.5s cubic-bezier(.4,.15,.7,1) forwards; }
  .screwfly.left{ animation:flyleft 1.5s cubic-bezier(.4,.15,.7,1) forwards; }
  @keyframes flydown{ 0%{ transform:translateY(0) rotate(0) } 100%{ transform:translateY(120vh) rotate(1100deg); opacity:.85 } }
  @keyframes flyleft{ 0%{ transform:translate(0,0) rotate(0) } 100%{ transform:translate(-120vw,0) rotate(1100deg); opacity:.85 } }
  /* D finale — panel comes loose and swings by its top-left corner, then snaps back */
  .panel.hang{ transform-origin:26px 26px; animation:hang 3.2s cubic-bezier(.3,.7,.4,1), disco 1.1s linear infinite; }
  @keyframes hang{
    0%{transform:none}
    12%{transform:translateY(20px) rotate(8deg)}
    30%{transform:translateY(15px) rotate(-6deg)}
    48%{transform:translateY(17px) rotate(5deg)}
    66%{transform:translateY(14px) rotate(-3deg)}
    82%{transform:translateY(8px) rotate(1.5deg)}
    100%{transform:none}   /* screws fly back → snaps straight */
  }
  .plaque{ position:absolute; inset:0; z-index:6; display:flex; align-items:center; justify-content:center; text-align:center;
    font-size:clamp(24px,7vw,50px); font-weight:900; letter-spacing:.12em; color:var(--hot); background:rgba(10,7,4,.82);
    opacity:0; pointer-events:none; transition:opacity .3s; text-shadow:0 0 30px var(--glow); }
  .plaque.show{ opacity:1; }
  /* Hidden FDF'erfest ad (long-press red button) — slides down, machine-styled, non-blocking */
  /* Top banner. Opaque, lighter-than-panel background so it reads as a raised banner (not just an orange ring). */
  .ad{ position:absolute; left:8px; right:8px; top:8px; z-index:8; display:flex; align-items:center; justify-content:center; gap:10px;
    background:linear-gradient(180deg,#3a2b1c,#241a10); border:2px solid var(--orange); border-radius:10px;
    padding:10px 14px; box-shadow:0 10px 26px rgba(0,0,0,.7),0 0 22px rgba(255,107,26,.55);
    transform:translateY(-180%); pointer-events:none; transition:transform .42s cubic-bezier(.3,1.25,.5,1); }
  .ad.show{ transform:translateY(0); pointer-events:auto; }
  .adtxt{ color:var(--plate); font-size:clamp(11px,2.5vw,15px); letter-spacing:.02em; }
  .adtxt b{ color:var(--hot); }
  .adbtn{ flex:none; color:#fff; text-decoration:none; font-weight:800; font-size:clamp(11px,2.5vw,14px); letter-spacing:.08em; white-space:nowrap;
    background:radial-gradient(circle at 40% 30%,var(--hot),var(--orange) 60%,var(--orange-deep)); padding:6px 13px; border-radius:6px; box-shadow:0 0 10px rgba(255,107,26,.6); }
  .adclose{ flex:none; color:var(--sub); font-size:14px; cursor:pointer; padding:0 2px; }
  /* Easter egg — blank-cell tap: propeller flies across the whole screen, spinning. */
  .propfly{ position:absolute; top:38%; left:-320px; z-index:60; width:min(260px,45vmin); pointer-events:none; animation:propcross 2.2s linear forwards; }
  .propfly img{ display:block; width:100%; filter:drop-shadow(0 6px 14px rgba(0,0,0,.55)); animation:propspin 0.85s linear infinite; }
  @keyframes propcross{ from{ left:-320px; } to{ left:calc(100% + 400px); } }
  @keyframes propspin{ from{ transform:rotate(0); } to{ transform:rotate(360deg); } }
  /* MASKINEN final — rotating disco spotlights sweeping across the machine */
  .beams{ position:absolute; inset:-40%; z-index:4; pointer-events:none; opacity:0; mix-blend-mode:screen; transition:opacity .3s;
    background:conic-gradient(from 0deg,
      transparent 0 14deg, rgba(255,146,46,.55) 14deg 22deg, transparent 22deg 60deg,
      rgba(201,79,214,.5) 60deg 68deg, transparent 68deg 108deg,
      rgba(63,214,192,.45) 108deg 116deg, transparent 116deg 168deg,
      rgba(255,107,26,.55) 168deg 176deg, transparent 176deg 240deg,
      rgba(255,178,87,.5) 240deg 248deg, transparent 248deg 300deg,
      rgba(201,79,214,.45) 300deg 308deg, transparent 308deg 360deg); }
  .beams.on{ opacity:1; animation:beamspin 3.4s linear infinite; }
  @keyframes beamspin{ to{ transform:rotate(360deg); } }
  /* MASKINEN final — big text across the machine (transparent → machine dances behind) */
  .bigtext{ position:absolute; inset:0; z-index:6; display:flex; align-items:center; justify-content:center; text-align:center; padding:0 5%;
    font-size:clamp(28px,10vw,78px); font-weight:900; letter-spacing:.04em; line-height:1.02; color:#fff;
    text-shadow:0 0 34px var(--glow),0 0 12px var(--orange),0 3px 0 rgba(0,0,0,.35);
    opacity:0; pointer-events:none; transform:scale(.7) rotate(-5deg); transition:opacity .3s,transform .3s; }
  .bigtext.show{ opacity:1; animation:bigwob 1.5s ease-in-out infinite .3s; }
  @keyframes bigwob{ 0%,100%{transform:scale(1) rotate(-5deg)} 50%{transform:scale(1.05) rotate(-2.5deg)} }
  /* dancing plate */
  .grid.dance .cell.num{ animation:platedance .5s ease-in-out infinite; }
  @keyframes platedance{ 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-7px) scale(1.06)} }
  .grid.dance .cell.num:nth-child(3n){ animation-delay:.08s } .grid.dance .cell.num:nth-child(3n+2){ animation-delay:.16s }
  /* Serial tap → "ÆGTE VARE" stamp */
  .serial{ cursor:pointer; }
  .serial.stamp{ animation:stamp .42s ease; color:#46d97a; text-shadow:0 0 10px #46d97a; }
  @keyframes stamp{ 0%{transform:scale(.5) rotate(-8deg);opacity:.3} 60%{transform:scale(1.25) rotate(3deg)} 100%{transform:scale(1) rotate(0)} }
  /* E — ember sparks when 90 lights up */
  .ember{ position:absolute; width:6px; height:6px; border-radius:50%; pointer-events:none; z-index:7;
    background:radial-gradient(circle,#fff 0%,#ffb257 40%,#e0490f 85%); box-shadow:0 0 8px #ff922e;
    animation:ember .9s ease-out forwards; }
  @keyframes ember{ to{ transform:translate(var(--dx),var(--dy)) scale(.15); opacity:0; } }
</style>

<body>

<script>
(function(){
  "use strict";

  // ---------- Randomness: crypto only (ADR-6). Never Date.now / raw Math.random. ----------
  // ponytail: modulo bias on a 32-bit draw is ~1e-9 for n<=90 — irrelevant for banko.
  function rnd(n){ const a=new Uint32Array(1); crypto.getRandomValues(a); return a[0] % n; }
  function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=rnd(i+1); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

  // ---------- Plate generation (classic Danish banko, 3×9). ----------
  function colRange(c){                 // inclusive [lo,hi]
    if(c===0) return [1,9];
    if(c===8) return [80,90];           // 80–90 = 11 numbers (off-by-one trap)
    return [c*10, c*10+9];
  }
  function drawUnique(lo,hi,k){         // k distinct numbers from [lo,hi], sorted asc
    const pool=[]; for(let v=lo; v<=hi; v++) pool.push(v);
    shuffle(pool);
    return pool.slice(0,k).sort((a,b)=>a-b);
  }
  function pickRows(cnt){               // subset of {0,1,2} of size cnt, sorted
    return shuffle([0,1,2]).slice(0,cnt).sort((a,b)=>a-b);
  }
  function colCounts(){                 // 9 columns, each 1–3, total 15
    const c=Array(9).fill(1); let extra=6;
    while(extra>0){ const i=rnd(9); if(c[i]<3){ c[i]++; extra--; } }
    return c;
  }
  function rowLayout(counts){           // rejection-sample until every row has exactly 5 (PLAN §3)
    for(let attempt=0; attempt<2000; attempt++){
      const rowsOfCol = counts.map(pickRows);
      const tot=[0,0,0];
      rowsOfCol.forEach(rs=>rs.forEach(r=>tot[r]++));
      if(tot[0]===5 && tot[1]===5 && tot[2]===5) return rowsOfCol;
    }
    throw new Error("rowLayout failed");
  }
  function makePlate(){                 // → 3×9 grid of number|null (explicit blanks, PLAN §3.5)
    const counts=colCounts();
    const rowsOfCol=rowLayout(counts);
    const grid=[[],[],[]].map(()=>Array(9).fill(null));
    for(let c=0;c<9;c++){
      const [lo,hi]=colRange(c);
      const nums=drawUnique(lo,hi,counts[c]);      // sorted asc
      const rows=rowsOfCol[c];                      // sorted asc → smallest on top
      rows.forEach((r,i)=> grid[r][c]=nums[i]);
    }
    return grid;
  }

  // ---------- Serial = FNV-1a hash of the 15 numbers (ADR-11). Deterministic, local. ----------
  function plateNums(grid){ const out=[]; for(const row of grid) for(const v of row) if(v!=null) out.push(v); return out; }
  function serialOf(grid){
    let h=0x811c9dc5>>>0;
    for(const n of plateNums(grid)){ h^=n; h=Math.imul(h,0x01000193)>>>0; }
    return "MSKN-"+h.toString(16).toUpperCase().padStart(8,"0").slice(-4);
  }

  // ---------- Self-check (?test): 5000 plates, log rule breaks (DoD). ----------
  function validate(grid){
    const errs=[];
    const nums=plateNums(grid);
    if(nums.length!==15) errs.push("total "+nums.length);
    if(new Set(nums).size!==nums.length) errs.push("dup numbers");
    for(let r=0;r<3;r++){ const c=grid[r].filter(v=>v!=null).length; if(c!==5) errs.push("row "+r+" has "+c); }
    for(let c=0;c<9;c++){
      const col=[grid[0][c],grid[1][c],grid[2][c]].filter(v=>v!=null);
      if(col.length<1||col.length>3) errs.push("col "+c+" has "+col.length);
      const [lo,hi]=colRange(c);
      for(const v of col){ if(v<lo||v>hi) errs.push("col "+c+" value "+v+" out of ["+lo+","+hi+"]"); }
      for(let i=1;i<col.length;i++){ if(col[i]<=col[i-1]) errs.push("col "+c+" not sorted"); }
    }
    return errs;
  }
  function selfCheck(){
    const N=5000; let breaks=0;
    for(let i=0;i<N;i++){ const e=validate(makePlate()); if(e.length){ breaks++; if(breaks<=5) console.error("plate",i,e); } }
    console.log("[?test] "+N+" plader, "+breaks+" regelbrud"+(breaks===0?" ✓":" ✗"));
    document.body.innerHTML='<pre style="color:'+(breaks?'#ff4d3d':'#46d97a')+';font:16px monospace;padding:20px">'
      +N+' plader — '+breaks+' regelbrud'+(breaks===0?' ✓ (se konsol)':' ✗ (se konsol)')+'</pre>';
  }

  // ---------- Persistence (localStorage, ADR-3). Plate pinned on first open (ADR-4). ----------
  const K_GRID="banko.grid", K_MARKS="banko.marks";
  function loadGrid(){
    try{ const s=localStorage.getItem(K_GRID); if(s){ const g=JSON.parse(s); if(validate(g).length===0) return g; } }catch(e){}
    return null;
  }
  function saveGrid(g){ try{ localStorage.setItem(K_GRID, JSON.stringify(g)); }catch(e){} }
  function loadMarks(){ try{ return new Set(JSON.parse(localStorage.getItem(K_MARKS)||"[]")); }catch(e){ return new Set(); } }
  function saveMarks(set){ try{ localStorage.setItem(K_MARKS, JSON.stringify([...set])); }catch(e){} }

  // ================= app =================
  const params=new URLSearchParams(location.search);
  if(params.has("test")){ selfCheck(); return; }

  const $=s=>document.querySelector(s);
  const panel=$("#panel"), gridEl=$("#grid"), crt=$("#crt"), serialEl=$("#serial"), bat=[...document.querySelectorAll("#bat i")];
  const title=$("#title"), secret=$("#secret"), win=$("#win"), winType=$("#wintype"), retbar=$("#retbar");

  let grid=loadGrid();
  if(!grid){ grid=makePlate(); saveGrid(grid); localStorage.removeItem(K_MARKS); }
  let marks=loadMarks();
  let prevCompleteRows=0, partyActive=false;

  function litCount(){ return plateNums(grid).filter(v=>marks.has(v)).length; }
  function completeRows(){
    let n=0;
    for(let r=0;r<3;r++){ const nums=grid[r].filter(v=>v!=null); if(nums.every(v=>marks.has(v))) n++; }
    return n;
  }
  function refreshReadouts(){
    const lit=litCount();
    crt.innerHTML=String(lit).padStart(2,"0")+"<span>/15</span>";
    bat.forEach((s,i)=>{ s.className=""; if(i<lit) s.classList.add("on", i<5?"g":i<10?"a":"r"); });
    document.querySelector(".batwrap").classList.toggle("full", lit>=15);
  }

  function render(){
    serialEl.textContent=serialOf(grid);
    gridEl.innerHTML="";
    for(let r=0;r<3;r++) for(let c=0;c<9;c++){
      const v=grid[r][c];
      const cell=document.createElement("div");
      if(v==null){ cell.className="cell blank"; cell.addEventListener("click",flyPropeller); }
      else{
        cell.className="cell num"+(marks.has(v)?" lit":"");
        cell.textContent=v; cell.dataset.n=v;
        cell.addEventListener("click",()=>toggle(v,cell));
      }
      gridEl.appendChild(cell);
    }
    prevCompleteRows=completeRows();
    refreshReadouts();
  }

  function toggle(v,cell){
    if(partyActive) return;
    if(marks.has(v)) marks.delete(v); else marks.add(v);
    cell.classList.toggle("lit", marks.has(v));
    saveMarks(marks);
    refreshReadouts();
    if(v===90 && marks.has(90)) emberBurst(cell);   // E — gnist ved 90
    const now=completeRows();
    if(now>prevCompleteRows && now>0) celebrate(now);
    prevCompleteRows=now;
  }

  // ---------- Party sequence (ADR-12): 20s. win-type + confetti + disco + techno + return bar. ----------
  const WIN_LABEL=[null,"1 RÆKKE","2 RÆKKER","FULD PLADE"];
  function celebrate(rows){
    partyActive=true;
    winType.textContent=WIN_LABEL[rows]||"BANKO!";
    win.classList.add("show"); panel.classList.add("party"); gridEl.classList.add("dance");
    startConfetti();
    playRave(9);                                   // starts on this tap = user gesture (mobile audio rule)
    retbar.className="bar"; void retbar.offsetWidth; retbar.classList.add("run"); // 100%→0 over 10s
    setTimeout(()=>{
      win.classList.remove("show"); panel.classList.remove("party"); gridEl.classList.remove("dance");
      stopConfetti();
      partyActive=false;
    },10000);
  }

  // Confetti — plain canvas, no lib.
  const cv=$("#confetti"), cx=cv.getContext("2d");
  let confetti=[], confAF=0;
  const CONF_COLORS=["#ff6b1a","#ffb257","#c94fd6","#42d6c0","#fff"];
  function startConfetti(){
    cv.width=panel.clientWidth; cv.height=panel.clientHeight;
    confetti=[];
    for(let i=0;i<160;i++) confetti.push({
      x:rnd(cv.width), y:-rnd(cv.height), w:5+rnd(7), h:8+rnd(9),
      vy:2+rnd(4), vx:(rnd(200)-100)/50, rot:rnd(360), vr:(rnd(200)-100)/20,
      col:CONF_COLORS[rnd(CONF_COLORS.length)]
    });
    cancelAnimationFrame(confAF); confAF=requestAnimationFrame(confStep);
  }
  function confStep(){
    cx.clearRect(0,0,cv.width,cv.height);
    for(const p of confetti){
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
      if(p.y>cv.height+20){ p.y=-20; p.x=rnd(cv.width); }
      cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot*Math.PI/180);
      cx.fillStyle=p.col; cx.fillRect(-p.w/2,-p.h/2,p.w,p.h); cx.restore();
    }
    confAF=requestAnimationFrame(confStep);
  }
  function stopConfetti(){ cancelAnimationFrame(confAF); cx.clearRect(0,0,cv.width,cv.height); }

  // One-shot confetti POP — bursts out from centre with gravity, fades, self-clears (~1.3s). No rain.
  function popConfetti(){
    cv.width=panel.clientWidth; cv.height=panel.clientHeight;
    const cxp=cv.width/2, cyp=cv.height*0.5, parts=[];
    for(let i=0;i<130;i++){ const a=Math.PI*2*rnd(360)/360, sp=4+rnd(10);
      parts.push({x:cxp+rnd(70)-35, y:cyp+rnd(40)-20, w:5+rnd(7), h:8+rnd(9),
        vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-4, rot:rnd(360), vr:(rnd(200)-100)/12, col:CONF_COLORS[rnd(CONF_COLORS.length)], life:1 }); }
    let frame=0; cancelAnimationFrame(confAF);
    (function tick(){
      cx.clearRect(0,0,cv.width,cv.height);
      parts.forEach(p=>{ p.vy+=0.35; p.x+=p.vx; p.y+=p.vy; p.vx*=0.99; p.rot+=p.vr; p.life-=0.013;
        if(p.life>0){ cx.globalAlpha=Math.max(0,p.life); cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot*Math.PI/180); cx.fillStyle=p.col; cx.fillRect(-p.w/2,-p.h/2,p.w,p.h); cx.restore(); } });
      cx.globalAlpha=1;
      if(++frame<82) confAF=requestAnimationFrame(tick); else cx.clearRect(0,0,cv.width,cv.height);
    })();
  }

  // Battery VU — segments flicker like an equalizer during the party, restored after.
  let vuTimer=null;
  function startVU(){ vuTimer=setInterval(()=>{ bat.forEach((s,i)=>{ s.className=""; if(rnd(2)) s.classList.add("on", i<5?"g":i<10?"a":"r"); }); },110); }
  function stopVU(){ clearInterval(vuTimer); vuTimer=null; refreshReadouts(); }

  // Techno stinger ~10s — four-on-floor kick + offbeat stab, Web Audio (ADR-12).
  function playTechno(secs){
    secs=secs||10;
    let ctx; try{ ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
    if(ctx.state==="suspended") ctx.resume();
    const master=ctx.createGain(); master.gain.value=0.5; master.connect(ctx.destination);
    const bpm=140, beat=60/bpm, t0=ctx.currentTime+0.04;
    const beats=Math.ceil(secs/beat);
    function kick(t){
      const o=ctx.createOscillator(), g=ctx.createGain();

    const cancel=()=>{ if(sc.dataset.out) return; sc.classList.remove("loosening"); clearTimeout(holds.get(sc)); };
    sc.addEventListener("pointerdown",start);
    sc.addEventListener("pointerup",cancel);
    sc.addEventListener("pointerleave",cancel);
    sc.addEventListener("pointercancel",cancel);
    sc.addEventListener("click",()=>{                    // single tap → little tighten-turn + metallic tick
      if(sc.dataset.out) return;
      sc.classList.remove("tick"); void sc.offsetWidth; sc.classList.add("tick");
      blip(880);
    });
  });
  function dropScrew(sc){
    sc.classList.remove("loosening"); sc.dataset.out="1";
    const r=sc.getBoundingClientRect();
    const fly=document.createElement("div"); fly.className="screw screwfly "+(matchMedia("(orientation:portrait)").matches?"left":"down");
    fly.style.left=r.left+"px"; fly.style.top=r.top+"px";
    document.body.appendChild(fly); setTimeout(()=>fly.remove(),1700);
    sc.classList.remove("loosening"); sc.classList.add("hole");   // leave an empty screw hole; the clone falls out of the window
    revSound();
    if(++screwsOut>=4) setTimeout(engineRoom,700);
  }
  function engineRoom(){
    panel.classList.add("hang"); strobe.classList.add("on"); playTechno(3); alarmBip();
    plaque.textContent="🔩 AV, MINE SKRUER! 🔩"; plaque.classList.add("show");
    setTimeout(()=>{                                   // near the end: screws reappear, panel snaps straight
      screws.forEach(s=>{ s.classList.remove("hole"); delete s.dataset.out; }); screwsOut=0;
      plaque.textContent="SAMLET IGEN 😤"; blip(760);
    },2600);
    setTimeout(()=>{
      plaque.classList.remove("show"); strobe.classList.remove("on"); panel.classList.remove("hang");
      if(!partyActive) panel.classList.remove("party");
    },3600);
  }

  // E — ember burst from a cell (spawns short-lived DOM sparks; no canvas conflict with confetti)
  function emberBurst(cell){
    const pr=panel.getBoundingClientRect(), cr=cell.getBoundingClientRect();
    const x=cr.left-pr.left+cr.width/2, y=cr.top-pr.top+cr.height/2;
    for(let i=0;i<16;i++){
      const e=document.createElement("div"); e.className="ember";
      e.style.left=x+"px"; e.style.top=y+"px";
      const ang=Math.PI*2*i/16 + rnd(100)/100, dist=30+rnd(55);
      e.style.setProperty("--dx",(Math.cos(ang)*dist).toFixed(0)+"px");
      e.style.setProperty("--dy",(Math.sin(ang)*dist-32).toFixed(0)+"px");   // bias upward — embers rise
      panel.appendChild(e); setTimeout(()=>e.remove(),950);
    }
  }

  // F — power-lamp 5× → recolor the WHOLE machine (panel, plates, bezel, readouts, glow). Session only.
  const TKEYS=["--orange","--orange-deep","--glow","--hot","--teal","--party","--party2","--bg","--panel","--plate","--plate-blank","--ink","--bezel1","--bezel2","--glowbg","--sub","--btnglow"];
  const THEMES=[
    ["MASKINEN", null],   // default warm orange
    ["IS", {"--orange":"#41b6ff","--orange-deep":"#0a63c8","--glow":"#7fd0ff","--hot":"#b4e4ff","--teal":"#8fefff","--party":"#5fa8ff","--party2":"#8fefff","--bg":"#0a1420","--panel":"#122436","--plate":"#e8f2fb","--plate-blank":"#b9cfe0","--ink":"#0e1c2b","--bezel1":"#c3d4e6","--bezel2":"#8aa6c4","--glowbg":"#1d3550","--sub":"#7d9dbd","--btnglow":"#7fd0ff"}],
    ["TOKSISK", {"--orange":"#8dff2f","--orange-deep":"#3aa000","--glow":"#b6ff6a","--hot":"#d6ff9a","--teal":"#eaff66","--party":"#b6ff3a","--party2":"#66ffcc","--bg":"#0c1405","--panel":"#182611","--plate":"#eef7df","--plate-blank":"#c4d3ae","--ink":"#16210a","--bezel1":"#c9d6a6","--bezel2":"#96a868","--glowbg":"#2c3d12","--sub":"#9db06e"}],
    ["NEON", {"--orange":"#ff3fb0","--orange-deep":"#c00f78","--glow":"#ff7ad0","--hot":"#ff9ade","--teal":"#3ff0ff","--party":"#c94fd6","--party2":"#3ff0ff","--bg":"#16081a","--panel":"#241030","--plate":"#fbe8f6","--plate-blank":"#d8b9d0","--ink":"#2a0a24","--bezel1":"#e0b8d8","--bezel2":"#a868a0","--glowbg":"#3a1240","--sub":"#b06ea0","--btnglow":"#ff7ad0"}],
    ["GULD", {"--orange":"#ffcf3f","--orange-deep":"#c78a00","--glow":"#ffe07a","--hot":"#fff0b0","--teal":"#ffd966","--party":"#ffb347","--party2":"#ffe07a","--bg":"#140f04","--panel":"#241d0c","--plate":"#f7efd8","--plate-blank":"#d3c9a6","--ink":"#211a08","--bezel1":"#e8d6a0","--bezel2":"#b8983f","--glowbg":"#3d3012","--sub":"#b0966e","--btnglow":"#ffe07a"}],
    ["VAMPYR", {"--orange":"#ff3b3b","--orange-deep":"#a00808","--glow":"#ff7a5a","--hot":"#ff9a7a","--teal":"#ff5a5a","--party":"#d63f5f","--party2":"#ff5a8a","--bg":"#150606","--panel":"#280f0f","--plate":"#f2e0e0","--plate-blank":"#caa6a6","--ink":"#2a0a0a","--bezel1":"#c6a0a0","--bezel2":"#8a4a4a","--glowbg":"#3d1212","--sub":"#b06e6e","--btnglow":"#ff7a5a"}],
    ["UV", {"--orange":"#a24fff","--orange-deep":"#5f10c0","--glow":"#c47aff","--hot":"#d69aff","--teal":"#7affff","--party":"#c94fd6","--party2":"#7affff","--bg":"#0e0818","--panel":"#1a1030","--plate":"#ece0fb","--plate-blank":"#c2b0d8","--ink":"#1a0a2a","--bezel1":"#cdb8e0","--bezel2":"#9868a8","--glowbg":"#2c1250","--sub":"#9d6eb0","--btnglow":"#c47aff"}]
  ];
  let theme=0;
  const pwr=document.querySelector(".pwr");
  pwr.addEventListener("click",()=>{                    // single click → next theme
    theme=(theme+1)%THEMES.length;
    TKEYS.forEach(k=>document.body.style.removeProperty(k));
    const t=THEMES[theme][1]; if(t) for(const k in t) document.body.style.setProperty(k,t[k]);
    blip(520);
    if(!magiBusy){ secret.textContent="◈ "+THEMES[theme][0]+" ◈"; secret.classList.remove("punch"); void secret.offsetWidth; secret.classList.add("show","punch");
      setTimeout(()=>{ if(!magiBusy) secret.classList.remove("show","punch"); },1100); }
  });

  // G — tap CRT → seed/hash flickers, then reverts to the count
  const crtBox=document.querySelector(".crt"); let crtBusy=false;
  function hex4(){ const a=new Uint32Array(1); crypto.getRandomValues(a); return a[0].toString(16).toUpperCase().padStart(8,"0").slice(-4); }
  function crtBeeps(){                              // "beep beep bop beep" retro chatter, synced to the flicker
    const ctx=AC(); if(!ctx) return;
    const notes=[988,988,523,880,988,660,988,784];
    notes.forEach((f,i)=>{ const t=ctx.currentTime+i*0.09; const o=ctx.createOscillator(),g=ctx.createGain();
      o.type="square"; o.frequency.value=f;
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.2,t+0.008); g.gain.exponentialRampToValueAtTime(0.001,t+0.07);
      o.connect(g).connect(ctx.destination); o.start(t); o.stop(t+0.08); });
    setTimeout(()=>{ try{ ctx.close(); }catch(e){} }, notes.length*90+300);
  }
  crtBox.addEventListener("click",()=>{
    if(crtBusy) return; crtBusy=true;
    crtBeeps();
    const real=serialOf(grid).slice(-4); let n=0;
    const iv=setInterval(()=>{
      if(n<8){ crt.textContent=hex4(); n++; }
      else{ clearInterval(iv); crt.textContent=real; setTimeout(()=>{ refreshReadouts(); crtBusy=false; },1000); }
    },90);
  });

  // Serial tap → maskinen stempler pladen "ÆGTE VARE" + gnist
  let serialBusy=false;
  serialEl.addEventListener("click",()=>{
    if(serialBusy) return; serialBusy=true;
    const real=serialEl.textContent;
    serialEl.textContent="✓ ÆGTE VARE";
    serialEl.classList.remove("stamp"); void serialEl.offsetWidth; serialEl.classList.add("stamp");
    blip(700); setTimeout(()=>blip(940),110);
    emberBurst(serialEl);
    setTimeout(()=>{ serialEl.textContent=real; serialEl.classList.remove("stamp"); serialBusy=false; },1300);
  });

  // ---------- Easter eggs I/J ----------
  let msgBusy=false; const aura=$("#aura");
  // I — tap the "TRYK FOR AT TÆNDE LYSET" label → in-place tease (at the element, like the serial stamp)
  const readoutEl=document.querySelector(".readout"); let roBusy=false;
  readoutEl.addEventListener("click",()=>{
    if(roBusy) return; roBusy=true;
    readoutEl.textContent="IKKE HER — TRYK PÅ TALLENE, HAHA";
    readoutEl.classList.remove("tease"); void readoutEl.offsetWidth; readoutEl.classList.add("tease");
    blip(620);
    setTimeout(()=>{ readoutEl.textContent="TRYK FOR AT TÆNDE LYSET"; readoutEl.classList.remove("tease"); roBusy=false; },2400);
  });
  // J — seniorkursus-beskeder (tilted text + warm breathing aura). 5 variations across 5 spots.
  function seniorMsg(word){
    if(msgBusy||magiBusy) return; msgBusy=true;
    aura.classList.add("show");
    secret.textContent="Tag på seniorkursus: det er godt for "+word+" ✦";
    secret.classList.remove("soul"); void secret.offsetWidth; secret.classList.add("show","soul");
    blip(500); setTimeout(()=>blip(680),130);
    setTimeout(()=>{ secret.classList.remove("show","soul"); aura.classList.remove("show"); msgBusy=false; },3600);
  }
  document.querySelector(".batwrap").addEventListener("click",()=>seniorMsg("din sjæl"));   // battery (tap)
  // 5 more: long-press on chrome controls (not the screws). Suppress the follow-up click so their tap-egg doesn't also fire.
  let seniorHoldFired=false;
  document.addEventListener("click",e=>{ if(seniorHoldFired){ seniorHoldFired=false; e.stopImmediatePropagation(); e.preventDefault(); } }, true);
  function addSeniorHold(el,word){ let t=null;
    el.addEventListener("pointerdown",()=>{ t=setTimeout(()=>{ seniorHoldFired=true; seniorMsg(word); setTimeout(()=>{ seniorHoldFired=false; },500); },700); });
    const c=()=>clearTimeout(t); el.addEventListener("pointerup",c); el.addEventListener("pointerleave",c); el.addEventListener("pointercancel",c);
  }
  addSeniorHold(k1,"dit tredje øjenbryn");
  addSeniorHold(k3,"dit hår");
  addSeniorHold(tgl,"verden");
  addSeniorHold(crtBox,"humøret");
  addSeniorHold(serialEl,"din far");
  // 6 more via simple click on the little rivets in the bottom-right (increasing silliness left→right)
  const RIVET_WORDS=["din instruktør","din krop","din hjerne","din mor","dit humør","dine tæer"];
  [...document.querySelectorAll("#rivets i")].forEach((r,i)=> r.addEventListener("click",()=>seniorMsg(RIVET_WORDS[i])));

  // ---------- Easter egg: tap MASKINEN 3× fast → machine "thinks, then answers". ----------
  const MAGI=["ANALYSERER...","MAGI: 51%","TEKNOLOGI: 49%","KAN IKKE SKELNE"];
  const bigtext=$("#bigtext"), beams=$("#beams");
  let taps=0, tt=null, magiT=null, magiBusy=false;
  function magiShow(){
    if(magiBusy) return; magiBusy=true;
    secret.classList.add("show");
    let i=0;
    (function step(){
      if(i<MAGI.length){
        secret.textContent=MAGI[i];
        secret.classList.remove("punch"); void secret.offsetWidth; secret.classList.add("punch");
        blip(360+i*90); i++;
        magiT=setTimeout(step,520);
      } else {
        secret.classList.remove("show","punch");
        magiFinal();
      }
    })();
  }
  function magiFinal(){                                 // full party: big text + spotlights + dancing plate + VU + confetti pop
    bigtext.textContent="HEY DET ER BEGGE DELE"; bigtext.classList.add("show");
    panel.classList.add("party"); gridEl.classList.add("dance"); beams.classList.add("on");
    startVU(); popConfetti(); playTechno(4);
    blip(880); setTimeout(()=>blip(1180),130); setTimeout(()=>blip(1560),260);
    magiT=setTimeout(()=>{
      bigtext.classList.remove("show"); gridEl.classList.remove("dance"); beams.classList.remove("on");
      if(!partyActive) panel.classList.remove("party");
      stopVU(); magiBusy=false;
    },4300);
  }
  function titleFx(cls){ title.classList.remove("flick","blast"); void title.offsetWidth; title.classList.add(cls); }
  let crownHeld=false, crownTimer=null;
  function crownTap(){                          // works on BOTH the title and the subtitle
    if(crownHeld){ crownHeld=false; return; }   // long-press already fired magi → ignore the trailing click
    taps++; clearTimeout(tt); tt=setTimeout(()=>taps=0,800);
    if(taps===1) titleFx("flick");             // 1× → neon flicker (no sound)
    else if(taps===2){ titleFx("blast"); emberBurst(title); }   // 2× → rainbow blast + sparks (no sound)
    else if(taps>=3){ taps=0; title.classList.remove("flick","blast"); magiShow(); }   // 3× → magi (with sound)
  }
  const crownDown=()=>{ crownHeld=false; crownTimer=setTimeout(()=>{ crownHeld=true; taps=0; title.classList.remove("flick","blast"); magiShow(); },2000); };
  const crownUp=()=>clearTimeout(crownTimer);
  [title, document.querySelector(".sub")].forEach(el=>{
    el.addEventListener("click",crownTap);
    el.addEventListener("pointerdown",crownDown);
    el.addEventListener("pointerup",crownUp);
    el.addEventListener("pointerleave",crownUp);
    el.addEventListener("pointercancel",crownUp);
  });

  // ---------- Debug mode (?fejlfinding): Ny plade-knap (ADR-9). Not for participants. ----------
  if(params.has("fejlfinding")){
    const dbg=$("#dbg"); dbg.classList.add("on");
    const counts={}; for(let c=0;c<9;c++){ counts[c]=grid.filter(row=>row[c]!=null).length; }
    $("#dbginfo").textContent="pr. kol: "+Object.values(counts).join(" ");
    $("#newplate").addEventListener("click",()=>{
      if(!confirm("Ny plade? Overskriver den gemte plade OG alle kryds.")) return;
      grid=makePlate(); saveGrid(grid); marks=new Set(); saveMarks(marks);
      prevCompleteRows=0; render();
      const cc={}; for(let c=0;c<9;c++){ cc[c]=grid.filter(row=>row[c]!=null).length; }
      $("#dbginfo").textContent="pr. kol: "+Object.values(cc).join(" ");
    });
  }

  render();
})();
</script>
</body>
</html>
